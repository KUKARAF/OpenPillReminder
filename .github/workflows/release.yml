name: Android Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign and Align APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. Find build tools
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 2. Decode keystore from the env variable
          echo "$SIGNING_KEY" | base64 -d > release.jks
          
          # 3. Align the APK
          $BUILD_TOOLS_PATH/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
          
          # 4. Sign the APK using env variables
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KEY_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out OpenPillReminder-${{ github.event.release.tag_name }}.apk \
            aligned.apk
          
          # 6. Cleanup
          rm release.jks aligned.apk

      - name: Generate APK Hash
        id: generate_hash
        run: |
          sha256=$(sha256sum OpenPillReminder-${{ github.event.release.tag_name }}.apk | awk '{ print $1 }')
          echo "apk_sha=$sha256" >> $GITHUB_OUTPUT
          echo "SHA-256 Hash of APK: $sha256"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v3
        with:
          files: OpenPillReminder-${{ github.event.release.tag_name }}.apk
          append_body: true
          body: |
            ---
            ### Security Verification
            **APK SHA-256 Hash:** `${{ steps.generate_hash.outputs.apk_sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}