name: Android Manual Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign and Align APK
        id: sign_app
        run: |
          # 1. Find the latest build tools 
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Using Build Tools from: $BUILD_TOOLS_PATH"
          
          # 2. Decode the keystore from secrets
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
          
          # 3. Align the APK 
          $BUILD_TOOLS_PATH/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk OpenPillReminder-latest-aligned.apk
          
          # 4. Sign the aligned APK
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out OpenPillReminder-latest.apk \
            OpenPillReminder-latest-aligned.apk
          
          # 5. Clean up the sensitive JKS file
          rm release.jks
          
          # 6. Generate hash for verification
          sha256=$(sha256sum OpenPillReminder-latest.apk | awk '{ print $1 }')
          echo "apk_sha=$sha256" >> $GITHUB_OUTPUT

      - name: Rename and Hash APK
        id: process_apk
        run: |
          NAME="OpenPillReminder-latest.apk"
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} "$NAME"
          
          sha256=$(sha256sum "$NAME" | awk '{ print $1 }')
          echo "SHA-256 Hash of APK: $sha256"
          echo "apk_name=$NAME" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenPillReminder-Production-Build
          path: ${{ steps.process_apk.outputs.apk_name }}
          if-no-files-found: error
          retention-days: 3